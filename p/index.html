<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            padding: 0px;
            margin: 0px;
            box-sizing: border-box;

        }
        .container{
            width: 100vw;
            height: 100vh;
            background: hsla(179, 67%, 66%, 1);
            background: -moz-linear-gradient(90deg, hsla(179, 67%, 66%, 1) 0%, hsla(238, 74%, 61%, 1) 100%);
            background: -webkit-linear-gradient(90deg, hsla(179, 67%, 66%, 1) 0%, hsla(238, 74%, 61%, 1) 100%);
            filter: progid: DXImageTransform.Microsoft.gradient( startColorstr="#6FE3E1", endColorstr="#5257E5", GradientType=1 );
            background: linear-gradient(90deg, hsla(179, 67%, 66%, 1) 0%, hsla(238, 74%, 61%, 1) 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            
        }
        .card{
            width: 360px;
            height: 510px;
            background-color: white;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            position: relative;
        }
        .detail{
            width: 80%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 20px;
            text-align: center;

        }
        .card img{
            width: 100%;
            height: 30%;
            border-top-right-radius: 20px;
            border-top-left-radius: 20px;
            align-items: start;
            gap: 20px;
        }
        .card h2{
            font-weight: bold;
            font-size: 1.5rem;
        }
        .amountbox{
            width:90%;
            height:15%;
            background-color: rgb(176, 212, 243);
            border-radius: 5px;
            padding: 2px;
            padding-left: 10px;
            padding-right: 10px;
            padding-top: 5px;
            line-height: 0px;
            display: flex;
            justify-content: space-between;
            gap: 5px;
        }
        .proceed{
            width:90%;
            height:15%;
            background-color: rgb(1, 39, 73);
            border-radius: 5px;
            padding: 2px;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0px 10px 12px black;
        }
        .proceed h3{
            font-size: 0.8rem;
        }
        .amountbox img{
            height: 85%;
            width: 20%;
            border-radius: 10px;
        }
        .amountbox a{
            align-self: center;
            padding-bottom: 7px;
        }
        .plan{
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 7px;
        }
        .amount{
            display: flex;
            gap: 5px;
        }
        #cancel{
            font-size: 1.3rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <img src="icon1.jpg" alt="icon">
            <div class="detail">
                <h2>Order Summary</h2>
                <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Autem veniam praesentium debitis harum ea voluptates </p>
                    <div class="amountbox">
                    <div class="amount">
                        <img src="music.png" alt="music">
                        <div class="plan">
                            <p>Annual plan</p>
                            <br>
                            <p>$99.9/year</p>
                        </div>    
                    </div>
                     <a href="#">Change</a>
                    </div>
                <div class="proceed">
                    <h3>Proceed to payment</h3>
                </div>
                <h2 id="cancel">Cancel Order</h2>
            </div>
        </div>

    </div>
</body>
</html>
